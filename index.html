<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verifier</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 0 40px rgba(99, 102, 241, 0.15);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #a5b4fc;
        }

        p.subtitle {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        input {
            flex: 1;
            padding: 12px 16px;
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: border 0.2s;
        }

        input:focus { border-color: #6366f1; }

        button {
            padding: 12px 20px;
            background: #6366f1;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        button:hover { background: #4f46e5; }
        button:disabled { background: #374151; cursor: not-allowed; }

        .result { display: none; }

        .status-card {
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .status-allow { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); }
        .status-block { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); }
        .status-suspicious { background: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.3); }

        .status-icon { font-size: 36px; }

        .status-info h2 { font-size: 20px; margin-bottom: 4px; }
        .status-allow h2 { color: #10b981; }
        .status-block h2 { color: #ef4444; }
        .status-suspicious h2 { color: #f59e0b; }

        .status-info p { font-size: 13px; color: #9ca3af; }

        .score-bar-container {
            margin-bottom: 20px;
        }

        .score-label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #9ca3af;
            margin-bottom: 8px;
        }

        .score-bar {
            height: 8px;
            background: #2a2a4a;
            border-radius: 99px;
            overflow: hidden;
        }

        .score-fill {
            height: 100%;
            border-radius: 99px;
            transition: width 0.6s ease;
        }

        .fill-allow { background: #10b981; }
        .fill-block { background: #ef4444; }
        .fill-suspicious { background: #f59e0b; }

        .reasons { list-style: none; }

        .reasons li {
            padding: 10px 14px;
            background: #0f0f1a;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 8px;
            color: #d1d5db;
        }

        .loader {
            display: none;
            text-align: center;
            padding: 20px;
            color: #6b7280;
            font-size: 14px;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #2a2a4a;
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Email Verifier</h1>
        <p class="subtitle">Check karo email real hai ya fake/temporary</p>

        <div class="input-group">
            <input type="email" id="emailInput" placeholder="email@company.com" />
            <button id="checkBtn" onclick="checkEmail()">Check</button>
        </div>

        <div class="loader" id="loader">
            <span class="spinner"></span> Checking...
        </div>

        <div class="result" id="result">
            <div class="status-card" id="statusCard">
                <div class="status-icon" id="statusIcon"></div>
                <div class="status-info">
                    <h2 id="statusText"></h2>
                    <p id="emailDisplay"></p>
                </div>
            </div>

            <div class="score-bar-container">
                <div class="score-label">
                    <span>Trust Score</span>
                    <span id="scoreText"></span>
                </div>
                <div class="score-bar">
                    <div class="score-fill" id="scoreFill" style="width: 0%"></div>
                </div>
            </div>

            <ul class="reasons" id="reasonsList"></ul>
        </div>
    </div>

    <script>
        async function checkEmail() {
            const email = document.getElementById('emailInput').value.trim();
            if (!email) return;

            const btn = document.getElementById('checkBtn');
            const loader = document.getElementById('loader');
            const result = document.getElementById('result');

            btn.disabled = true;
            loader.style.display = 'block';
            result.style.display = 'none';

            try {
                const res = await fetch(`http://127.0.0.1:8000/check-email?email=${encodeURIComponent(email)}`);
                const data = await res.json();

                const statusCard = document.getElementById('statusCard');
                const statusIcon = document.getElementById('statusIcon');
                const statusText = document.getElementById('statusText');
                const emailDisplay = document.getElementById('emailDisplay');
                const scoreFill = document.getElementById('scoreFill');
                const scoreText = document.getElementById('scoreText');
                const reasonsList = document.getElementById('reasonsList');

                statusCard.className = 'status-card';
                scoreFill.className = 'score-fill';

                if (data.status === 'Allow') {
                    statusCard.classList.add('status-allow');
                    scoreFill.classList.add('fill-allow');
                    statusIcon.textContent = '✅';
                    statusText.textContent = 'Allow — Legit Email!';
                } else if (data.status === 'Suspicious') {
                    statusCard.classList.add('status-suspicious');
                    scoreFill.classList.add('fill-suspicious');
                    statusIcon.textContent = '⚠️';
                    statusText.textContent = 'Suspicious — Dhyan Rakho!';
                } else {
                    statusCard.classList.add('status-block');
                    scoreFill.classList.add('fill-block');
                    statusIcon.textContent = '❌';
                    statusText.textContent = 'Block — Fake Email!';
                }

                emailDisplay.textContent = data.email;
                scoreText.textContent = `${data.score}/100`;
                scoreFill.style.width = `${data.score}%`;

                reasonsList.innerHTML = '';
                const reasons = data.reasons || [data.reason];
                reasons.forEach(r => {
                    const li = document.createElement('li');
                    li.textContent = r;
                    reasonsList.appendChild(li);
                });

                result.style.display = 'block';
            } catch (e) {
                alert('API se connect nahi ho paya — server chal raha hai?');
            }

            btn.disabled = false;
            loader.style.display = 'none';
        }

        document.getElementById('emailInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') checkEmail();
        });
    </script>
</body>
</html>
